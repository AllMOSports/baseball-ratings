name: Nightly Baseball Ratings

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-ratings:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 numpy

      - name: Run ratings script
        run: python baseball_ratings.py

      - name: Commit and push ratings.json
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add ratings.json scoreboard.csv
          git diff --staged --quiet || git commit -m "Update ratings $(date +'%Y-%m-%d')"
          git push
